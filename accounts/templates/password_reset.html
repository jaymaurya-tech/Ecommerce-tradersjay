<div class="max-w-md mx-auto mt-10 p-6 bg-white shadow-md rounded-lg">
    <h2 class="text-2xl font-bold text-orange-500 mb-4">Reset Password</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.email.label_tag }}
        {{ form.email }}
        <button type="submit" class="w-full mt-4 bg-orange-500 text-white py-2 rounded-full font-bold">Send Email</button>
    </form>
</div>
