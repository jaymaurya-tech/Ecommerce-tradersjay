<div class="max-w-md mx-auto mt-10 p-6 bg-white shadow-md rounded-lg">
    <h2 class="text-2xl font-bold text-orange-500 mb-4">Set New Password</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            {{ form.as_p }}
        </div>
        <button type="submit" class="w-full bg-orange-500 text-white py-2 rounded-full font-bold">Update Password</button>
    </form>
</div>
